name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build'
        required: true
        default: 'v0.1.4.1'

permissions:
  contents: write
  packages: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Build binary
        shell: bash
        run: |
          VER="${{ github.ref_name }}"
          VER="${VER#v}"
          go build -ldflags="-s -w -H windowsgui -X github.com/JastRedPanda/Nimbus/internal/build.Version=${VER} -X github.com/JastRedPanda/Nimbus/internal/build.Date=$(date +%m.%Y)" -o nimbus.exe .
      - uses: actions/upload-artifact@v4
        with:
          name: nimbus-windows
          path: nimbus.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev dpkg-dev rpm reprepro createrepo-c gnupg
      - name: Generate GPG keys
        run: |
          gpg --batch --passphrase '' --quick-gen-key nimbus-ci default default
          gpg --armor --export nimbus-ci > public.key
      - name: Build binary
        run: |
          VER="${{ github.ref_name }}"
          go build -ldflags="-s -w -X github.com/JastRedPanda/Nimbus/internal/build.Version=${VER#v} -X github.com/JastRedPanda/Nimbus/internal/build.Date=$(date +%m.%Y)" -o nimbus .
      - name: Build .deb
        run: |
          mkdir -p dist/debian/nimbus/DEBIAN
          mkdir -p dist/debian/nimbus/usr/bin
          mkdir -p dist/debian/nimbus/usr/share/applications
          install -m 755 nimbus dist/debian/nimbus/usr/bin/
          install -m 644 dist/nimbus.desktop dist/debian/nimbus/usr/share/applications/
          install -m 644 dist/debian/control dist/debian/nimbus/DEBIAN/
          dpkg-deb --build dist/debian/nimbus "dist/nimbus_$(echo ${{ github.ref_name }} | sed 's/^v//')-1_amd64.deb"
      - name: Build .rpm
        run: |
          mkdir -p dist/rpm/BUILD dist/rpm/RPMS dist/rpm/SRPMS
          sed "s/^Version:.*/Version: $(echo ${{ github.ref_name }} | sed 's/^v//')/" dist/rpm/nimbus.spec > dist/rpm/nimbus_tmp.spec
          rpmbuild -bb --define "_topdir $(pwd)/dist/rpm" dist/rpm/nimbus_tmp.spec 2>/dev/null || true
          # rpmbuild may print errors but still produce the rpm
          find dist/rpm/RPMS -name '*.rpm' -exec mv {} dist/ \;
      - name: Sign packages
        run: |
          # Sign DEB
          # Note: debian packages usually require .changes file for proper signing
          # Signing just the .deb for now as a simple approach
          gpg --batch --passphrase '' --detach-sign --armor dist/*.deb
          # Sign RPM
          echo "%_gpg_name nimbus-ci" > ~/.rpmmacros
          rpm --addsign dist/*.rpm
      - uses: actions/upload-artifact@v4
        with:
          name: nimbus-linux
          path: |
            dist/nimbus_*.deb
            dist/nimbus_*.deb.asc
            dist/nimbus-*.rpm
            public.key
            nimbus

  publish:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: nimbus-windows
          path: artifacts
      - uses: actions/download-artifact@v4
        with:
          name: nimbus-linux
          path: artifacts
      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd artifacts
          FILES=$(find . -type f | tr '\n' ' ')
          gh release create "${{ github.ref_name }}" --repo ${{ github.repository }} --title "${{ github.ref_name }}" --notes "See [README](https://github.com/JastRedPanda/Nimbus#readme)" $FILES

  publish-packages:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: nimbus-linux
          path: artifacts/linux
      - uses: actions/download-artifact@v4
        with:
          name: nimbus-windows
          path: artifacts/windows
      - name: Upload to GitHub Packages
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          # Используем версию из ref, если это тег
          VERSION: ${{ github.ref_name }}
        run: |
          # Убираем 'v' из версии, если она есть
          VERSION=${VERSION#v}
          
          upload_file() {
            local file=$1
            local filename=$(basename $file)
            curl -X PUT \
              -H "Authorization: token $GH_TOKEN" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @"$file" \
              "https://pkg.github.com/$OWNER/$REPO/generic/nimbus/$VERSION/$filename"
          }

          find artifacts -type f | while read file; do
            upload_file "$file"
          done

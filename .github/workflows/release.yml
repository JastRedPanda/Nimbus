name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build'
        required: true
        default: 'v0.1.4.1'

permissions:
  contents: write
  packages: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Build binary
        shell: bash
        run: |
          VER="${{ github.ref_name }}"
          VER="${VER#v}"
          go build -ldflags="-s -w -H windowsgui -X github.com/JastRedPanda/Nimbus/internal/build.Version=${VER} -X github.com/JastRedPanda/Nimbus/internal/build.Date=$(date +%m.%Y)" -o nimbus.exe .
      - uses: actions/upload-artifact@v4
        with:
          name: nimbus-windows
          path: nimbus.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev dpkg-dev rpm reprepro createrepo-c gnupg golang
      - name: Generate GPG keys
        run: |
          gpg --batch --passphrase '' --quick-gen-key nimbus-ci default default
          gpg --armor --export nimbus-ci > public.key
      - name: Build binary
        run: |
          VER="${{ github.ref_name }}"
          go build -ldflags="-s -w -X github.com/JastRedPanda/Nimbus/internal/build.Version=${VER#v} -X github.com/JastRedPanda/Nimbus/internal/build.Date=$(date +%m.%Y)" -o nimbus .
      - name: Build .deb
        run: |
          mkdir -p dist/debian/nimbus/DEBIAN
          mkdir -p dist/debian/nimbus/usr/bin
          mkdir -p dist/debian/nimbus/usr/share/applications
          install -m 755 nimbus dist/debian/nimbus/usr/bin/
          install -m 644 dist/nimbus.desktop dist/debian/nimbus/usr/share/applications/
          install -m 644 dist/debian/control dist/debian/nimbus/DEBIAN/
          dpkg-deb --build dist/debian/nimbus "dist/nimbus_$(echo ${{ github.ref_name }} | sed 's/^v//')-1_amd64.deb"
      - name: Build .rpm
        run: |
          VERSION=$(echo ${{ github.ref_name }} | sed 's/^v//')
          mkdir -p dist/rpm/BUILD/build-rpm dist/rpm/RPMS dist/rpm/SRPMS
          cp nimbus dist/rpm/BUILD/build-rpm/
          sed "s/^Version:.*/Version: ${VERSION}/" dist/rpm/nimbus.spec > dist/rpm/nimbus_tmp.spec
          rpmbuild -bb --nodeps --define "_topdir $(pwd)/dist/rpm" dist/rpm/nimbus_tmp.spec 2>&1 || true
          find dist/rpm/RPMS -name '*.rpm' -exec mv {} dist/ \; 2>/dev/null || true
      - name: Sign packages
        run: |
          # Sign DEB
          # Note: debian packages usually require .changes file for proper signing
          # Signing just the .deb for now as a simple approach
          gpg --batch --passphrase '' --detach-sign --armor dist/*.deb
          # Sign RPM
          echo "%_gpg_name nimbus-ci" > ~/.rpmmacros
          rpm --addsign dist/*.rpm
      - uses: actions/upload-artifact@v4
        with:
          name: nimbus-linux
          path: |
            dist/nimbus_*.deb
            dist/nimbus_*.deb.asc
            dist/nimbus-*.rpm
            public.key
            nimbus

  publish:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: nimbus-windows
          path: artifacts
      - uses: actions/download-artifact@v4
        with:
          name: nimbus-linux
          path: artifacts
      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd artifacts
          # Only upload actual distributables: Windows .exe, Linux binary, .deb, .rpm
          FILES=$(find . -type f \( -name "*.exe" -o -name "nimbus" -o -name "*.deb" -o -name "*.rpm" \) ! -name "*.asc" | tr '\n' ' ')
          # Skip if release already exists
          if gh release view "${{ github.ref_name }}" --repo ${{ github.repository }} &>/dev/null; then
            echo "Release ${{ github.ref_name }} already exists, uploading assets..."
            gh release upload "${{ github.ref_name }}" $FILES --repo ${{ github.repository }} --clobber
          else
            gh release create "${{ github.ref_name }}" --repo ${{ github.repository }} --title "${{ github.ref_name }}" --notes "See [README](https://github.com/JastRedPanda/Nimbus#readme)" $FILES
          fi

  publish-packages:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: nimbus-linux
          path: artifacts/linux
      - uses: actions/download-artifact@v4
        with:
          name: nimbus-windows
          path: artifacts/windows
      - name: Upload to GitHub Packages
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION=${VERSION#v}

          # Create package version if it doesn't exist
          echo "Creating package version $VERSION..."
          gh api --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /repos/$OWNER/$REPO/packages/generic/nimbus/versions \
            -f version_name="$VERSION" \
            -f package_name="nimbus" \
            -f visibility="public" 2>/dev/null || echo "Version may already exist, continuing..."

          # Upload each package file
          find artifacts -type f \( -name "*.deb" -o -name "*.rpm" \) | while read file; do
            filename=$(basename "$file")
            echo "Uploading $filename to GitHub Packages..."
            
            # Get upload URL for this file
            upload_url=$(gh api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              --method POST \
              /repos/$OWNER/$REPO/packages/generic/nimbus/$VERSION/$filename \
              --jq '.upload_url')
            
            if [ -n "$upload_url" ] && [ "$upload_url" != "null" ]; then
              curl -X PUT \
                -H "Authorization: token $GH_TOKEN" \
                -H "Content-Type: application/octet-stream" \
                --data-binary @"$file" \
                "$upload_url"
              echo "Uploaded $filename"
            else
              echo "Failed to get upload URL for $filename"
            fi
          done

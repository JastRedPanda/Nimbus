<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" href="/icon" type="image/png">
<title>Nimbus — {{.title}}</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#111;color:#eee;padding:20px;max-width:640px;margin:0 auto}
h1{text-align:center;font-size:20px;margin-bottom:16px;color:#888}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:8px 6px;color:#888;font-size:13px;font-weight:600;border-bottom:1px solid #333}
td{padding:10px 6px;border-bottom:1px solid #222;font-size:14px}
tr:last-child td{border-bottom:none}
td.icon{font-size:24px;text-align:center}
td.temp{text-align:right}
td.extra{text-align:right;color:#888;font-size:12px}
</style>
</head>
<body>
<h1>{{.title}}</h1>
<table>
<thead><tr>
<th>Date</th><th>Condition</th><th>Temp</th><th>Wind</th><th>Precip</th>
</tr></thead>
<tbody>
{{range .rows}}<tr>
<td>{{.Date}}</td>
<td class="icon">{{.Icon}}</td>
<td class="temp">{{.TempMax}} / {{.TempMin}}</td>
<td class="extra">{{.Wind}}</td>
<td class="extra">{{.Precip}}</td>
</tr>{{end}}
</tbody>
</table>
</body>
</html>

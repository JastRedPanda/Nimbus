<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1c1c1e;color:#eee;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
.card{text-align:center;padding:40px}
h1{font-size:28px;margin-bottom:8px;font-weight:700}
.sub{font-size:16px;color:#888;margin-bottom:24px}
.info{font-size:14px;color:#666;margin-top:4px}
</style>
</head>
<body>
<div class="card">
<h1>Nimbux</h1>
<div class="sub">Мультиплатформний інформер погоди.</div>
<div class="info">{{.Date}}</div>
<div class="info">v{{.Version}}</div>
</div>
</body>
</html>
